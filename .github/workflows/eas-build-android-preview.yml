name: EAS Build Android Preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Apps using EAS
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: 🏗 Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🚀 Build Locally on GitHub Runner (Android)
        run: eas build --profile preview --platform android --local --non-interactive
        env:
          EXPO_NO_TELEMETRY: 1

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: "*.apk"
